services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    hostname: jellyfin
    environment:
      - PUID=${PUID-1000}
      - PGID=${PGID-1000}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_PUBLISHED_URL}
    volumes:
      - jellyfin_config:/config
      - ${MOVIES_SOURCE_PATH}:/data/movies
      - ${TV_SHOWS_SOURCE_PATH}:/data/tvshows
    ports:
      - 8096:8096
      - 7359:7359/udp
      - 1900:1900/udp
    restart: unless-stopped
    networks:
      - default

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - TZ=${TZ}
    ports:
      - 5055:5055
    volumes:
      - jellyseerr_config:/app/config
    restart: unless-stopped
    networks:
      - default

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID-1000}
      - PGID=${PGID-1000}
      - TZ=${TZ}
    volumes:
      - radarr_config:/config
      - ${DOWNLOADS_SOURCE_PATH}:/downloads
      - ${MOVIES_SOURCE_PATH}:/movies
    restart: unless-stopped
    networks:
      - default

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID-1000}
      - PGID=${PGID-1000}
      - TZ=${TZ}
    volumes:
      - sonarr_config:/config
      - ${DOWNLOADS_SOURCE_PATH}:/downloads
      - ${TV_SHOWS_SOURCE_PATH}:/tv
    restart: unless-stopped
    networks:
      - default

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID-1000}
      - PGID=${PGID-1000}
      - TZ=${TZ}
    volumes:
      - prowlarr_config:/config
    restart: unless-stopped
    networks:
      - default

  rdtclient:
    image: rogerfar/rdtclient:latest
    container_name: rdtclient
    environment:
      - PUID=${PUID-1000}
      - PGID=${PGID-1000}
      - TZ=${TZ}
    volumes:
      - rdtclient_data:/data/db
      - ${DOWNLOADS_SOURCE_PATH}:/data/downloads
    ports:
      - 6500:6500
    restart: unless-stopped
    networks:
      - default

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID-1000}
      - PGID=${PGID-1000}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_config:/config
      - ${DOWNLOADS_SOURCE_PATH}:/downloads
    ports:
      - 8080:8080
    restart: unless-stopped
    networks:
      - default

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID-1000}
      - PGID=${PGID-1000}
      - TZ=${TZ}
    volumes:
      - sabnzbd_config:/config
      - ${DOWNLOADS_SOURCE_PATH}:/downloads
    ports:
      - 8081:8080
    restart: unless-stopped
    networks:
      - default

volumes:
  jellyfin_config:
  jellyseerr_config:
  radarr_config:
  sonarr_config:
  prowlarr_config:
  qbittorrent_config:
  sabnzbd_config:
  rdtclient_data:

networks:
  default:
    name: ${PROXY_NETWORK_NAME}
    external: true
